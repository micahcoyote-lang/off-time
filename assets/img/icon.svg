<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <rect width="192" height="192" rx="38" fill="#f4efe1"/>
  <!-- desk -->
  <rect x="28" y="120" width="136" height="14" rx="4" fill="#2b2b2b"/>
  <!-- stick figure, back to viewer -->
  <g fill="none" stroke="#2b2b2b" stroke-width="6" stroke-linecap="round">
    <circle cx="96" cy="64" r="18" fill="#f4efe1"/>
    <line x1="96" y1="82" x2="96" y2="120"/>
    <line x1="96" y1="96" x2="74" y2="116"/>
    <line x1="96" y1="96" x2="118" y2="116"/>
  </g>
  <!-- clock accent (Off Time) -->
  <g stroke="#e8624a" stroke-width="6" fill="none" stroke-linecap="round">
    <circle cx="140" cy="52" r="20" fill="#fff"/>
    <line x1="140" y1="52" x2="140" y2="40"/>
    <line x1="140" y1="52" x2="150" y2="58"/>
  </g>
</svg>
