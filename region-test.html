<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Earth — region streaming test (Phase C)</title>
<style>
  html, body { margin: 0; height: 100%; overflow: hidden; background: #0b1220; color: #cfe3ff; font-family: system-ui, sans-serif; }
  canvas { display: block; }
  #hud { position: fixed; top: 10px; left: 10px; z-index: 10; background: rgba(8,14,28,.82); border: 1px solid #2a3a55;
         border-radius: 8px; padding: 10px 12px; font: 12px/1.5 ui-monospace, monospace; max-width: 320px; }
  #hud h1 { font-size: 13px; margin: 0 0 6px; color: #9fd0ff; }
  #hud input { width: 56px; background: #0e1830; color: #cfe3ff; border: 1px solid #2a3a55; border-radius: 4px; padding: 2px 4px; font: inherit; }
  #hud button { margin-top: 6px; background: #1c3a6e; color: #dcebff; border: 1px solid #3a5a8e; border-radius: 5px; padding: 4px 10px; cursor: pointer; font: inherit; }
  #hud button:hover { background: #244a86; }
  #stats { margin-top: 8px; color: #8fb6e6; white-space: pre-line; }
  #hint { margin-top: 8px; color: #6f90c0; }
</style>
</head>
<body>
<div id="hud">
  <h1>Phase C — region streaming test</h1>
  <label>freq <input id="freq" type="number" value="200" min="32" max="2000" step="8"></label>
  <label>chunk <input id="csize" type="number" value="24" min="8" max="64" step="4"></label>
  <label>seed <input id="seed" type="number" value="1337"></label>
  <button id="go">Restart</button>
  <div id="stats">starting…</div>
  <div id="hint">Click to capture the mouse · <b>W A S D</b> move · mouse look · <b>Space/Shift</b> up/down · <b>Esc</b> release · scroll = speed. Fly around — chunks stream in/out around you.</div>
</div>
<script type="module">
import * as THREE from './assets/vendor/three.module.js';
import { makeSolidMaterial } from './js/games/planet-mesh.js';
import { ChunkStreamer, StreamWorld } from './js/games/planet-stream.js';
import { addressOf } from './js/games/icosphere-address.js';
import { genColumns } from './js/games/planet-region.js';
import { MAX_R, R, radius, SEA_L } from './data/planet.js';

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(2, devicePixelRatio));
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x9fc4f0);
scene.fog = new THREE.FogExp2(0xa8d1ff, 0.02);
const camera = new THREE.PerspectiveCamera(62, innerWidth / innerHeight, 0.05, MAX_R * 8);

const sunDir = new THREE.Vector3(0.4, 1, 0.5).normalize();
const sun = new THREE.DirectionalLight(0xfff4e0, 1.1); sun.position.copy(sunDir).multiplyScalar(MAX_R * 4); scene.add(sun);
scene.add(new THREE.HemisphereLight(0xcfe7ff, 0x33414f, 0.7));
scene.add(new THREE.AmbientLight(0xffffff, 0.25));

const solidMat = makeSolidMaterial();
const waterMat = new THREE.MeshBasicMaterial({ vertexColors: true, transparent: true, opacity: 0.62, depthWrite: false });

const statsEl = document.getElementById('stats');
const yawDir = new THREE.Vector3(1, 0, 0);   // forward tangent (world); kept perpendicular to the radial up
let pitch = -0.2;                            // look angle above/below the horizon
let streamer = null;

function start() {
  if (streamer) streamer.dispose();
  const f = Math.max(32, Math.min(2000, parseInt(document.getElementById('freq').value) || 200));
  const S = Math.max(8, Math.min(64, parseInt(document.getElementById('csize').value) || 24));
  const seed = parseInt(document.getElementById('seed').value) | 0;
  const world = new StreamWorld(f, seed, S);
  streamer = new ChunkStreamer({ scene, world, solidMat, waterMat, radiusCols: 3 * S });
  streamer._f = f; streamer._S = S;
  // place the camera just above the terrain at (0,0,1), looking along the local tangent
  const startDir = new THREE.Vector3(0, 0, 1);
  const surfR = surfaceRadiusAt(startDir, f, seed);
  camera.position.copy(startDir).multiplyScalar(surfR + 1.5);
  yawDir.set(1, 0, 0); pitch = -0.2;          // look "east" along the surface, slightly down
}
// surface radius under a direction: generate just the column there and read its top layer
function surfaceRadiusAt(dir, f, seed) {
  const d = genColumns([addressOf(dir, f)], f, seed);
  return radius((d.columns[0] ? d.columns[0].s : SEA_L) + 2);
}

document.getElementById('go').addEventListener('click', start);

// ---- free-fly camera ----
const keys = new Set();
let speed = R * 0.02;
const _mUp = new THREE.Vector3();
renderer.domElement.addEventListener('click', () => renderer.domElement.requestPointerLock());
document.addEventListener('mousemove', (e) => {
  if (document.pointerLockElement !== renderer.domElement) return;
  _mUp.copy(camera.position).normalize();                       // radial "up"
  yawDir.applyAxisAngle(_mUp, -e.movementX * 0.0022);           // yaw around up
  yawDir.addScaledVector(_mUp, -yawDir.dot(_mUp)).normalize();  // keep forward tangent
  pitch = Math.max(-1.45, Math.min(1.45, pitch - e.movementY * 0.0022));
});
addEventListener('keydown', (e) => keys.add(e.code));
addEventListener('keyup', (e) => keys.delete(e.code));
addEventListener('wheel', (e) => { speed *= e.deltaY < 0 ? 1.15 : 0.87; speed = Math.max(R * 0.002, Math.min(R * 0.6, speed)); });
addEventListener('resize', () => { camera.aspect = innerWidth / innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth, innerHeight); });

const fwd = new THREE.Vector3(), right = new THREE.Vector3(), upW = new THREE.Vector3(), anchor = new THREE.Vector3();
let last = performance.now(), fps = 60, acc = 0, frames = 0;
function frame() {
  const now = performance.now(), dt = Math.min(0.05, (now - last) / 1000); last = now;
  // sphere-aware basis: up = radial, forward = tangent yawDir tilted by pitch, right = forward × up
  upW.copy(camera.position).normalize();
  yawDir.addScaledVector(upW, -yawDir.dot(upW)).normalize();    // re-tangent as we move around the globe
  right.crossVectors(yawDir, upW).normalize();
  fwd.copy(yawDir).applyAxisAngle(right, pitch);
  const v = speed * dt * 60;
  if (keys.has('KeyW')) camera.position.addScaledVector(fwd, v);
  if (keys.has('KeyS')) camera.position.addScaledVector(fwd, -v);
  if (keys.has('KeyD')) camera.position.addScaledVector(right, v);
  if (keys.has('KeyA')) camera.position.addScaledVector(right, -v);
  if (keys.has('Space')) camera.position.addScaledVector(upW, v);
  if (keys.has('ShiftLeft')) camera.position.addScaledVector(upW, -v);
  camera.up.copy(upW); camera.lookAt(camera.position.clone().add(fwd));

  let info = null;
  if (streamer) { anchor.copy(camera.position).normalize(); info = streamer.update(anchor, 6); }
  renderer.render(scene, camera);

  acc += dt; frames++;
  if (acc >= 0.4) { fps = Math.round(frames / acc); acc = 0; frames = 0;
    if (info) statsEl.textContent = `f=${streamer._f}  chunk=${streamer._S}\nactive ${info.active}  pending ${info.pending}\ncached ${info.cached} chunks\naltitude ${(camera.position.length() - R).toFixed(1)}\n${fps} fps`;
  }
  requestAnimationFrame(frame);
}
start();
frame();
</script>
</body>
</html>
